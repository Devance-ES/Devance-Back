spring.application.name=fonar

# ConfigurańŃo do Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/fonar_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=fonar_bd
spring.datasource.password=fonar_bd
spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.h2.console.path=/h2
spring.h2.console.enable=true


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

